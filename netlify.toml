[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[functions."publish"]
  # Sem delay interno agora — 1 conta = ~3-5s de API. 15s é margem ampla.
  timeout = 15

[functions."publish-finish"]
  timeout = 26

[functions."scheduler"]
  # Explode itens em sub-itens (< 2s por item normal) e processa
  # per_account/video_finish individualmente (~3-5s cada, 3 em paralelo).
  # 26s é suficiente para 3-5 per_account simultâneos.
  timeout = 26

[functions."drive-auth"]
  timeout = 10

[functions."drive-browse"]
  timeout = 20
