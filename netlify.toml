[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  # ── Variáveis de volume de publicação (ajuste conforme necessidade) ──────────
  # MAX_POSTS_PER_DAY=25          # padrão no código: 50 — recomendado: 25
  # MAX_POSTS_PER_HOUR=1          # padrão: 1 — não aumentar
  # MIN_GAP_MINUTES=30            # padrão: 10 — recomendado: 30 (evita ban por burst)
  # ACCOUNT_GAP_MS=20000          # padrão: 15000 — recomendado: 20000
  # PUBLISH_BATCH_SIZE=3          # padrão: 5 — recomendado: 3
  # POST_WINDOW_START=8           # padrão: 0 — só posta a partir das 8h local
  # POST_WINDOW_END=22            # padrão: 24 — para de postar às 22h local
  # TZ_OFFSET_HOURS=-3            # fuso horário: -3 = BRT (Brasília)

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[headers]]
  for = "/api/auth-callback*"
  [headers.values]
    Cross-Origin-Opener-Policy = "unsafe-none"
    Cross-Origin-Embedder-Policy = "unsafe-none"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[functions."publish"]
  # Criação de container de vídeo na Meta pode levar 10-15s sozinha.
  # Com 15s o timeout expirava antes de receber o creation_id, deixando
  # o item travado em "running" e nunca publicando. 26s resolve isso.
  timeout = 26

[functions."publish-finish"]
  timeout = 26

[functions."scheduler"]
  # Explode itens em sub-itens (< 2s por item normal) e processa
  # per_account/video_finish individualmente (~3-5s cada, 3 em paralelo).
  # 26s é suficiente para 3-5 per_account simultâneos.
  timeout = 26

[functions."drive-auth"]
  timeout = 10

[functions."drive-browse"]
  timeout = 20

[functions."drive-proxy"]
  # Baixa vídeos do Drive (~100MB) — precisa de tempo generoso
  timeout = 120
