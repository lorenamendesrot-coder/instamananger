name: Scheduler
 
on:
  schedule:
    - cron: "*/5 * * * *"  # a cada 5 minutos (mínimo do GitHub Actions)
  workflow_dispatch:        # permite disparar manualmente pelo painel
 
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar scheduler
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "https://eclectic-bombolone-29d49b.netlify.app/.netlify/functions/scheduler"
